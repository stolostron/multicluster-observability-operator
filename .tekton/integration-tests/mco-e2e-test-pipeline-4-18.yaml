---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  annotations:
    pipelinesascode.tekton.dev/task: "[mco-install, mco-e2e-tests]"
  name: mco-e2e-tests-pipeline
spec:
  description: |
    This pipeline automates the process of running end-to-end tests for MCO
    using HyperShift-based ephemeral clusters. The pipeline provisions a hub and
    a managed cluster, installs OCM hub/spoke core and the MCO operator via the
    existing setup scripts, imports the managed cluster, then runs the Ginkgo e2e
    test suite via the existing run-e2e-tests.sh script.
  params:
    - name: SNAPSHOT
      description: 'The JSON string representing the snapshot of the application under test.'
      default: '{"components": [{"name":"test-app", "containerImage": "quay.io/example/repo:latest"}]}'
      type: string
    - name: test-name
      description: 'The name of the test corresponding to a defined Konflux integration test.'
      default: 'mco-e2e-tests'
    - name: namespace
      description: 'Namespace for MCO observability components'
      default: 'open-cluster-management-observability'
  tasks:
    - name: eaas-provision-space
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerKind
          value: PipelineRun
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
    - name: provision-hub
      runAfter:
        - eaas-provision-space
      taskSpec:
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
          - name: pick-version
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
            params:
              - name: prefix
                value: "4.21."
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: version
                value: "$(steps.pick-version.results.version)"
              - name: instanceType
                value: "m5.2xlarge"
              - name: timeout
                value: "40m"
              - name: imageContentSources
                value: |
                  - source: registry.redhat.io/rhacm2
                    mirrors:
                      - quay.io/redhat-user-workloads/crt-redhat-acm-tenant
    - name: provision-managed
      runAfter:
        - eaas-provision-space
      taskSpec:
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
          - name: pick-version
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
            params:
              - name: prefix
                value: "4.21."
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: version
                value: "$(steps.pick-version.results.version)"
              - name: instanceType
                value: "m5.xlarge"
              - name: timeout
                value: "40m"
    - name: mco-install
      description: Install OCM hub/spoke core, MCO operator, and import managed cluster
      runAfter:
        - provision-hub
        - provision-managed
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: namespace
          value: "$(params.namespace)"
      taskSpec:
        params:
          - name: SNAPSHOT
          - name: namespace
            type: string
        volumes:
          - name: credentials
            emptyDir: {}
        steps:
          - name: get-hub-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-hub.results.clusterName)"
              - name: credentials
                value: credentials
          - name: get-managed-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-managed.results.clusterName)"
              - name: credentials
                value: credentials
          - name: install
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-hub-kubeconfig.results.kubeconfig)"
              - name: MANAGED_KUBECONFIG
                value: "/credentials/$(steps.get-managed-kubeconfig.results.kubeconfig)"
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              #!/usr/bin/env bash
              set -exo pipefail

              echo "=== Installing dependencies ==="
              dnf -y install jq git gettext

              echo "=== Cloning MCO repository at PR revision ==="
              GIT_URL=$(echo "${SNAPSHOT}" | jq -r '[.components[] | select(.name | test("^multicluster-observability-operator-acm-"))] | .[0].source.git.url')
              GIT_REVISION=$(echo "${SNAPSHOT}" | jq -r '[.components[] | select(.name | test("^multicluster-observability-operator-acm-"))] | .[0].source.git.revision')
              echo "Source: ${GIT_URL} @ ${GIT_REVISION}"
              git clone "${GIT_URL}" /tmp/mco
              cd /tmp/mco
              git checkout "${GIT_REVISION}"

              echo "=== Extracting component images from SNAPSHOT ==="
              # Build tag-based refs (repo:git-sha) instead of digest refs (repo@sha256:hash).
              # MCH constructs images as image-remote/image-name:image-tag — the colon-based
              # join cannot produce @sha256: digest references.
              snapshot_tag_ref() {
                local component="$1"
                local obj=$(echo "${SNAPSHOT}" | jq -r "[.components[] | select(.name | test(\"^${component}-acm-\"))] | .[0]")
                local repo=$(echo "$obj" | jq -r '.containerImage | split("@")[0]')
                local rev=$(echo "$obj" | jq -r '.source.git.revision')
                echo "${repo}:${rev}"
              }

              export MCO_IMAGE=$(snapshot_tag_ref "multicluster-observability-operator")
              export ENDPOINT_IMAGE=$(snapshot_tag_ref "endpoint-monitoring-operator")
              export METRICS_COLLECTOR_IMAGE=$(snapshot_tag_ref "metrics-collector")
              export RBAC_QUERY_PROXY_IMAGE=$(snapshot_tag_ref "rbac-query-proxy")
              export GRAFANA_DASHBOARD_LOADER_IMAGE=$(snapshot_tag_ref "grafana-dashboard-loader")

              echo "MCO operator image: ${MCO_IMAGE}"
              echo "Endpoint monitoring image: ${ENDPOINT_IMAGE}"
              echo "Metrics collector image: ${METRICS_COLLECTOR_IMAGE}"
              echo "RBAC query proxy image: ${RBAC_QUERY_PROXY_IMAGE}"
              echo "Grafana dashboard loader image: ${GRAFANA_DASHBOARD_LOADER_IMAGE}"

              echo "=== Installing ACM via OLM ==="
              export ACM_VERSION=2.16
              ./dev-scripts/setup-upstream-catalog.sh

              echo "=== Applying Konflux image overrides ==="
              ./dev-scripts/image-override.sh

              echo "=== Waiting for MCO operator rollout after image override ==="
              oc rollout status deployment/multicluster-observability-operator \
                -n open-cluster-management --timeout=300s || true
              oc wait pod -n open-cluster-management \
                -l name=multicluster-observability-operator \
                --for=condition=Ready --timeout=300s

              echo "=== Verifying image overrides ==="
              oc get configmap image-override -n open-cluster-management -o yaml
              oc get multiclusterhub multiclusterhub -n open-cluster-management -o jsonpath='{.metadata.annotations}' | jq .

              echo "=== Importing managed cluster into hub ==="
              oc create namespace managed --dry-run=client -o yaml | oc apply -f -

              cat <<MCEOF | oc apply -f -
              apiVersion: cluster.open-cluster-management.io/v1
              kind: ManagedCluster
              metadata:
                name: managed
                labels:
                  cloud: auto-detect
                  vendor: auto-detect
              spec:
                hubAcceptsClient: true
              MCEOF

              oc create secret generic auto-import-secret \
                -n managed \
                --from-file=kubeconfig="${MANAGED_KUBECONFIG}" \
                --dry-run=client -o yaml | oc apply -f -

              oc wait managedcluster managed \
                --for=condition=ManagedClusterConditionAvailable=True \
                --timeout=300s

              echo "=== Verifying managed cluster registration ==="
              oc get managedcluster

              echo "=== Deploying observability ==="
              ./dev-scripts/setup-observability.sh || {
                echo "=== MCO deployment failed — debugging ==="
                oc get pods -n open-cluster-management -o wide
                oc get pods -n open-cluster-management-observability -o wide
                oc describe pods -n open-cluster-management -l name=multicluster-observability-operator
                oc get multiclusterobservability observability -o yaml
                exit 1
              }

              echo "=== Verifying MCO is using Konflux images ==="
              oc get deploy multicluster-observability-operator -n open-cluster-management -o jsonpath='{.spec.template.spec.containers[*].image}' && echo
              oc get pods -n open-cluster-management -l name=multicluster-observability-operator -o jsonpath='{range .items[*]}{.spec.containers[*].image}{"\n"}{end}'
              oc get pods -n open-cluster-management-observability -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[*].image}{"\n"}{end}'

              echo "=== MCO installation complete ==="
    - name: mco-e2e-tests
      description: Run MCO Ginkgo e2e test suite using existing run-e2e-tests.sh
      runAfter:
        - mco-install
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: namespace
          value: "$(params.namespace)"
      taskSpec:
        params:
          - name: SNAPSHOT
          - name: namespace
            type: string
        volumes:
          - name: credentials
            emptyDir: {}
        steps:
          - name: get-hub-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-hub.results.clusterName)"
              - name: credentials
                value: credentials
          - name: get-managed-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-managed.results.clusterName)"
              - name: credentials
                value: credentials
          - name: run-e2e-tests
            resources:
              requests:
                memory: 4Gi
                cpu: "4"
              limits:
                memory: 8Gi
                cpu: "8"
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-hub-kubeconfig.results.kubeconfig)"
              - name: MANAGED_KUBECONFIG
                value: "/credentials/$(steps.get-managed-kubeconfig.results.kubeconfig)"
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              #!/usr/bin/env bash
              set -exo pipefail

              echo "=== Installing dependencies ==="
              dnf -y install jq vim unzip git make wget

              echo "=== Installing Go ==="
              curl -Lo /go.tar.gz https://go.dev/dl/go1.24.9.linux-amd64.tar.gz
              tar -C /usr/local -xzf /go.tar.gz
              export PATH=$PATH:/usr/local/go/bin
              export GOPATH=/tmp/go
              export GOBIN=/tmp/go/bin
              export GOCACHE=/tmp/.cache/go-build
              export PATH=$PATH:/tmp/go/bin
              mkdir -p /tmp/go/bin $GOCACHE
              chmod -R 777 /tmp/go/bin $GOPATH $GOCACHE
              go version

              echo "=== Cloning MCO repository at PR revision ==="
              GIT_URL=$(echo "${SNAPSHOT}" | jq -r '[.components[] | select(.name | test("^multicluster-observability-operator-acm-"))] | .[0].source.git.url')
              GIT_REVISION=$(echo "${SNAPSHOT}" | jq -r '[.components[] | select(.name | test("^multicluster-observability-operator-acm-"))] | .[0].source.git.revision')
              echo "Source: ${GIT_URL} @ ${GIT_REVISION}"
              git clone "${GIT_URL}" /tmp/mco
              cd /tmp/mco
              git checkout "${GIT_REVISION}"

              echo "=== Extracting component images from SNAPSHOT ==="
              export MULTICLUSTER_OBSERVABILITY_OPERATOR_IMAGE_REF=$(echo "${SNAPSHOT}" | jq -r '[.components[] | select(.name | test("^multicluster-observability-operator-acm-"))] | .[0].containerImage')
              export ENDPOINT_MONITORING_OPERATOR_IMAGE_REF=$(echo "${SNAPSHOT}" | jq -r '[.components[] | select(.name | test("^endpoint-monitoring-operator-acm-"))] | .[0].containerImage')
              export METRICS_COLLECTOR_IMAGE_REF=$(echo "${SNAPSHOT}" | jq -r '[.components[] | select(.name | test("^metrics-collector-acm-"))] | .[0].containerImage')
              export RBAC_QUERY_PROXY_IMAGE_REF=$(echo "${SNAPSHOT}" | jq -r '[.components[] | select(.name | test("^rbac-query-proxy-acm-"))] | .[0].containerImage')
              export GRAFANA_DASHBOARD_LOADER_IMAGE_REF=$(echo "${SNAPSHOT}" | jq -r '[.components[] | select(.name | test("^grafana-dashboard-loader-acm-"))] | .[0].containerImage')

              echo "=== Setting up SHARED_DIR with cluster kubeconfigs ==="
              export SHARED_DIR=/tmp/shared
              mkdir -p "${SHARED_DIR}"
              cp "${KUBECONFIG}" "${SHARED_DIR}/hub-1.kc"
              cp "${MANAGED_KUBECONFIG}" "${SHARED_DIR}/managed-1.kc"

              echo "=== Running run-e2e-tests.sh ==="
              ./cicd-scripts/run-e2e-tests.sh

              echo "=== All e2e tests passed ==="
