apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: open-cluster-management-observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              mkdir -p /data/acm-observability-thanostore && \
              minio server /data --console-address :9090
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: storage
              mountPath: /data
      volumes:
        # emptyDir is intentional: this is a dev-only setup, persistence is not needed.
        - name: storage
          emptyDir: {}
