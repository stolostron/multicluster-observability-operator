            {
              "exemplar": true,
              "expr": "(sum by (cluster,namespace,name)(rate(kubevirt_vmi_cpu_usage_seconds_total{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\"}[$__range]))>0)\n/\n(\n  sum by (cluster, namespace, name)(kubevirt_vm_resource_requests{cluster=~\"$cluster\",namespace=~\"$namespace\", name=~\"$name\", resource=\"cpu\", unit=\"cores\"})\n  * on (cluster, namespace, name) group_left()\n  sum by (cluster, namespace, name)(kubevirt_vm_resource_requests{cluster=~\"$cluster\",namespace=~\"$namespace\", name=~\"$name\", resource=\"cpu\", unit=\"sockets\"})\n  * on (cluster, namespace, name) group_left()\n  sum by (cluster, namespace, name)(kubevirt_vm_resource_requests{cluster=~\"$cluster\",namespace=~\"$namespace\", name=~\"$name\", resource=\"cpu\", unit=\"threads\"})\n)",
              "format": "table",
              "hide": false,
              "instant": true,
              "interval": "",
              "legendFormat": "",
              "refId": "H"
            },
            {
              "exemplar": true,
              "expr": "avg by (cluster,namespace,name) (\navg_over_time(kubevirt_vmi_memory_available_bytes{cluster=~\"$cluster\",namespace=~\"$namespace\", name=~\"$name\"}[$__range]) - avg_over_time(kubevirt_vmi_memory_unused_bytes{cluster=~\"$cluster\",namespace=~\"$namespace\", name=~\"$name\"}[$__range]) - avg_over_time(kubevirt_vmi_memory_cached_bytes{cluster=~\"$cluster\",namespace=~\"$namespace\", name=~\"$name\"}[$__range])\n)",
              "format": "table",
              "hide": false,
