kind: ConfigMap
apiVersion: v1
metadata:
  name: thanos-ruler-default-rules
data:
  default_rules.yaml: |
    groups:
      - name: kubernetes-storage
        rules:
        - alert: KubePersistentVolumeFillingUp
          annotations:
            summary: PersistentVolume is filling up.
            description: "The PersistentVolume claimed by {{ $labels.persistentvolumeclaim }} in Namespace {{ $labels.namespace }} is only {{ $value | humanizePercentage }} free."
          expr: kubelet_volume_stats_available_bytes{namespace="open-cluster-management-observability"}/kubelet_volume_stats_capacity_bytes{namespace="open-cluster-management-observability"} < 0.03
          for: 1m
          labels:
            instance: "{{ $labels.instance }}"
            cluster: "{{ $labels.cluster }}"
            clusterID: "{{ $labels.clusterID }}"
            PersistentVolumeClaim: "{{ $labels.persistentvolumeclaim }}"
            severity: info
        - alert: KubePersistentVolumeFillingUp
          annotations:
            summary: PersistentVolume is filling up and is predicted to run out of space in 6h.
            description: "The PersistentVolume claimed by {{ $labels.persistentvolumeclaim }} in Namespace {{ $labels.namespace }} is only {{ $value | humanizePercentage }} free."
          expr: (kubelet_volume_stats_available_bytes{namespace="open-cluster-management-observability"}/kubelet_volume_stats_capacity_bytes{namespace="open-cluster-management-observability"}) < 0.15 and (predict_linear(kubelet_volume_stats_available_bytes{namespace="open-cluster-management-observability"}[6h], 4 * 24 * 3600)) <0
          for: 1h
          labels:
            instance: "{{ $labels.instance }}"
            cluster: "{{ $labels.cluster }}"
            clusterID: "{{ $labels.clusterID }}"
            PersistentVolumeClaim: "{{ $labels.persistentvolumeclaim }}"
            severity: info
      - name: policy-reports
        rules:
        - alert: ViolatedPolicyReport
          annotations:
            summary: "There is a policy report violation with a {{ $labels.severity }} severity level detected."
            description: "The policy: {{ $labels.policy }} has a severity of {{ $labels.severity }} on cluster: {{ $labels.cluster }}"
          expr: sum without (managed_cluster_id) (label_replace((sum without (clusterID) (label_replace((sum(policyreport_info * on (managed_cluster_id) group_left (cluster) label_replace(acm_managed_cluster_labels, "cluster", "$1", "name", "(.*)")) by (cluster, category, clusterID, managed_cluster_id, policy, severity) > 0),"hub_cluster_id", "$1", "clusterID", "(.*)"))),"clusterID", "$1", "managed_cluster_id", "(.*)"))
          for: 1m
          labels:
            severity: "{{ $labels.severity }}"
      - name: slo-sli-trends
        rules:
        - expr: sli:apiserver_request_duration_seconds:trend:1m >= bool 0.9900
          record: sli:apiserver_request_duration_seconds:bin:trend:1m
          labels:
            target: 0.9900
      - name: grafana-dashboard
        rules:
        - expr: sum(cluster:kube_pod_container_resource_requests:cpu:sum) by (cluster) / sum(kube_node_status_allocatable{resource="cpu"}) by (cluster)
          record: cluster:cpu_requested:ratio
          labels:
            usage: grafana-dashboard
        - expr: sum(cluster:kube_pod_container_resource_requests:memory:sum) by (cluster) / sum(kube_node_status_allocatable{resource="memory"}) by (cluster)
          record: cluster:memory_requested:ratio
          labels:
            usage: grafana-dashboard
        - expr: 1 - sum(:node_memory_MemAvailable_bytes:sum) by (cluster) / sum(kube_node_status_allocatable{resource="memory"}) by (cluster)
          record: cluster:memory_utilized:ratio
          labels:
            usage: grafana-dashboard
        - expr: sum(machine_cpu_cores) by (cluster)
          record: cluster:cpu_cores:sum
          labels:
            usage: grafana-dashboard
        - expr: sum(kube_node_status_allocatable{resource="cpu"}) by (cluster)
          record: cluster:cpu_allocatable:sum
          labels:
            usage: grafana-dashboard
        - expr: sum(machine_memory_bytes) by (cluster)
          record: cluster:machine_memory:sum
          labels:
            usage: grafana-dashboard
      - name: cluster-health-records
        rules:
        - record: cluster:metrics_received:heartbeat
          # We use a set of fallback metrics to create a reliable heartbeat.
          # We aggregate raw metrics by cluster FIRST to keep cardinality low.
          # Pre-aggregated recording rules are placed first.
          expr: |
            sum by (cluster, clusterID) (cluster:cpu_cores:sum)
            or
            sum by (cluster, clusterID) (machine_cpu_cores)
            or
            sum by (cluster, clusterID) (node_memory_MemAvailable_bytes)
            or
            sum by (cluster, clusterID) (up)
            or
            sum by (cluster, clusterID) (apiserver_request_total)
            or
            sum by (cluster, clusterID) (kube_pod_info)
      - name: cluster-health
        rules:
        - alert: ManagedClusterMetricsMissing
          annotations:
            summary: "Managed cluster {{ $labels.cluster }} is not sending metrics."
            description: "The managed cluster {{ $labels.cluster }} observability addon lease is reporting as 'available', but no metrics have been received on the Hub for the last 15 minutes."
            investigation: >
              Context: The OCM 'feature.open-cluster-management.io/addon-*' label only tracks 
              the lease status (available, unhealthy, unreachable). It does not reflect functional 
              degradation. The collector might be running and updating its lease, but failing 
              to federate or remote-write metrics due to network issues, auth failures, or 
              internal crashes. Check the metrics-collector or prometheus-agent (MCOA) logs on 
              the spoke cluster and the Thanos receive endpoints on the Hub.
          # This alert uses the synthetic heartbeat to support both Legacy and MCOA architectures.
          expr: |
            (
              label_replace(label_replace(acm_managed_cluster_labels{maintenance_mode=~"false|", feature_open_cluster_management_io_addon_multicluster_observability_addon="available"}, "cluster", "$1", "name", "(.*)"), "clusterID", "$1", "managed_cluster_id", "(.*)")
              or
              label_replace(label_replace(acm_managed_cluster_labels{maintenance_mode=~"false|", feature_open_cluster_management_io_addon_observability_controller="available"}, "cluster", "$1", "name", "(.*)"), "clusterID", "$1", "managed_cluster_id", "(.*)")
            )
            unless on(cluster, clusterID) (
              cluster:metrics_received:heartbeat
            )
          for: 15m
          labels:
            severity: critical
            cluster: "{{ $labels.cluster }}"
            clusterID: "{{ $labels.clusterID }}"
