---
apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: acm-virtual-machines-service-level
  namespace: observability-virtualization
spec:
  config:
    display:
      name: Service Level dashboards / Virtual Machines Service Level
    duration: 1h
    layouts:
    - kind: Grid
      spec:
        display:
          title: Panel Group 1
        items:
        - content:
            $ref: '#/spec/panels/0'
          height: 3
          width: 8
          x: 0
          'y': 0
        - content:
            $ref: '#/spec/panels/1'
          height: 3
          width: 8
          x: 8
          'y': 0
        - content:
            $ref: '#/spec/panels/2'
          height: 3
          width: 8
          x: 16
          'y': 0
        - content:
            $ref: '#/spec/panels/3'
          height: 3
          width: 8
          x: 0
          'y': 3
        - content:
            $ref: '#/spec/panels/4'
          height: 3
          width: 8
          x: 8
          'y': 3
        - content:
            $ref: '#/spec/panels/5'
          height: 3
          width: 8
          x: 16
          'y': 3
        - content:
            $ref: '#/spec/panels/6'
          height: 16
          width: 24
          x: 0
          'y': 6
    panels:
      '0':
        kind: Panel
        spec:
          display:
            description: The total uptime % of the VMs that are listed in the dashboard
            name: Total Uptime %
          plugin:
            kind: StatChart
            spec:
              calculation: last-number
              colorMode: none
              format:
                unit: percent-decimal
              metricLabel: ''
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "avg(\n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"running\"\
                    } > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)/ \n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"\
                    $name\", namespace=~\"$namespace\"} > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)\n)"
                  seriesNameFormat: ''
      '1':
        kind: Panel
        spec:
          display:
            description: The total planned downtime % of the VMs that are listed in the dashboard
            name: Total Planned Downtime %
          plugin:
            kind: StatChart
            spec:
              calculation: last-number
              colorMode: none
              format:
                unit: percent-decimal
              metricLabel: ''
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "avg(\n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"starting|migrating|non_running\"\
                    } > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)/ \n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"\
                    $name\", namespace=~\"$namespace\"} > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)\n)"
                  seriesNameFormat: ''
      '2':
        kind: Panel
        spec:
          display:
            description: The total unplanned downtime of the VMs that are listed in the dashboard
            name: Total Unplanned Downtime %
          plugin:
            kind: StatChart
            spec:
              calculation: last-number
              colorMode: none
              format:
                unit: percent-decimal
              metricLabel: ''
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "avg(\n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"error\"\
                    } > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)/ \n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"\
                    $name\", namespace=~\"$namespace\"} > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)\n)"
                  seriesNameFormat: ''
      '3':
        kind: Panel
        spec:
          display:
            description: The total uptime of the VMs that are listed in the dashboard
            name: Total Uptime (Hours)
          plugin:
            kind: StatChart
            spec:
              calculation: last-number
              colorMode: none
              format:
                unit: decimal
              metricLabel: ''
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "sum(\n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"running\"\
                    } > bool 0) \n    [$__range:5m]\n    ) *300 )\n    +${status:raw}\n)/3600\n)"
                  seriesNameFormat: ''
      '4':
        kind: Panel
        spec:
          display:
            description: The total planned downtime of the VMs that are listed in the dashboard
            name: Total Planned Downtime (Hours)
          plugin:
            kind: StatChart
            spec:
              calculation: last-number
              colorMode: none
              format:
                unit: decimal
              metricLabel: ''
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "sum(\n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"starting|migrating|non_running\"\
                    } > bool 0) \n    [$__range:5m]\n    ) *300 )\n    +${status:raw}\n)/3600\n)"
                  seriesNameFormat: ''
      '5':
        kind: Panel
        spec:
          display:
            description: The total unplanned downtime of the VMs that are listed in the dashboard
            name: Total Unplanned Downtime (Hours)
          plugin:
            kind: StatChart
            spec:
              calculation: last-number
              colorMode: none
              format:
                unit: decimal
              metricLabel: ''
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "sum(\n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"error\"\
                    } > bool 0) \n    [$__range:5m]\n    ) *300 )\n    +${status:raw}\n)/3600\n)"
                  seriesNameFormat: ''
      '6':
        kind: Panel
        spec:
          display:
            name: Virtual Machines List by Time In Status
          plugin:
            kind: Table
            spec:
              columnSettings:
              - hide: true
                name: timestamp
              - enableSorting: true
                header: Cluster
                name: cluster
              - enableSorting: true
                header: Namespace
                name: namespace
              - enableSorting: true
                header: VM Name
                name: name
              - enableSorting: true
                header: Status
                name: status_group
              - enableSorting: true
                header: Reason
                name: status
              - hide: true
                name: clusterID
              - hide: true
                name: container
              - hide: true
                name: endpoint
              - hide: true
                name: instance
              - hide: true
                name: job
              - hide: true
                name: pod
              - hide: true
                name: receive
              - hide: true
                name: service
              - hide: true
                name: tenant_id
              - format:
                  unit: datetime-local
                header: VM Create Date
                hide: true
                name: 'value #6'
              - hide: true
                name: 'value #1'
              - enableSorting: true
                format: &id001
                  unit: hours
                header: Uptime
                name: 'value #7'
              - enableSorting: true
                format: &id002
                  unit: percent-decimal
                header: Uptime %
                name: 'value #8'
              - enableSorting: true
                format: *id001
                header: Planned Downtime
                name: 'value #2'
              - enableSorting: true
                format: *id002
                header: Planned Downtime %
                name: 'value #3'
              - enableSorting: true
                format: *id001
                header: Unplanned Downtime
                name: 'value #4'
              - enableSorting: true
                format: *id002
                header: Unplanned Downtime %
                name: 'value #5'
              - hide: true
                name: __name__
              - hide: true
                name: guest_os_kernel_release
              - hide: true
                name: guest_os_machine
              - hide: true
                name: os
              - hide: true
                name: disk_name
              - name: 'value #9'
                hide: true
              transforms:
              - kind: MergeSeries
                spec: {}
              - kind: JoinByColumnValue
                spec:
                  columns:
                  - cluster
                  - name
                  - namespace
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster, namespace, name, status_group)(kubevirt_vm_info{cluster=~"$cluster", name=~"$name", namespace=~"$namespace"})+${status:raw}
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"starting|migrating|non_running\"\
                    } > bool 0) \n    [$__range:5m]\n    ) *300 )\n    +${status:raw}\n)/3600"
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"starting|migrating|non_running\"\
                    } > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)/ \n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"\
                    $name\", namespace=~\"$namespace\"} > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)"
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"error\"}\
                    \ > bool 0) \n    [$__range:5m]\n    ) *300)\n    +${status:raw}\n)/3600"
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"error\"}\
                    \ > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)/ \n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"\
                    $name\", namespace=~\"$namespace\"} > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)"
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: ((kubevirt_vm_create_date_timestamp_seconds{cluster=~"$cluster", name=~"$name", namespace=~"$namespace"}>0) *1000 )+${status:raw}
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"running\"\
                    } > bool 0) \n    [$__range:5m]\n    ) *300 )\n    +${status:raw}\n)/3600"
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: "(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"$name\", namespace=~\"$namespace\", status_group=~\"running\"\
                    } > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)/ \n(\n  sum by (cluster, name , namespace)(\n    sum_over_time(\n    (kubevirt_vm_info{cluster=~\"$cluster\", name=~\"\
                    $name\", namespace=~\"$namespace\"} > bool 0) \n    [$__range:5m]\n    ))\n    +${status:raw}\n)"
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster, namespace, name, status)(kubevirt_vm_info{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", status_group="error"})+${status:raw}
    variables:
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        defaultValue:
        - $__all
        display:
          hidden: false
          name: Cluster
        name: cluster
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: cluster
            matchers:
            - kubevirt_vm_info
        sort: none
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        defaultValue:
        - $__all
        display:
          description: Filter the Virtual Machine by its Namespace
          hidden: false
          name: Namespace
        name: namespace
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: namespace
            matchers:
            - kubevirt_vmi_info
        sort: none
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        defaultValue:
        - $__all
        display:
          description: Filter the Virtual Machine by its name
          hidden: false
          name: VM Name
        name: name
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: name
            matchers:
            - kubevirt_vmi_info
        sort: none
    - kind: ListVariable
      spec:
        allowAllValue: false
        allowMultiple: false
        defaultValue:
        - on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info)))
        display:
          hidden: false
          name: Status
        name: status
        plugin:
          kind: StaticListVariable
          spec:
            values:
            - label: All
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info)))
            - label: stopped
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group="non_running"}>0)))
            - label: starting
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group="starting"} > 0)))
            - label: migrating
              value: on(cluster, name, namespace) group_left() (0*(sum by (cluster, namespace, name)(kubevirt_vm_info{status_group="migrating"}>0)))
            - label: error
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group="error"}>0)))
            - label: running
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group="running"}>0)))
