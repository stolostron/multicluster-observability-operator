    layouts:
    - kind: Grid
      spec:
        display:
          title: Panel Group 1
          collapse:
            open: true
        items:
        - x: 0
          'y': 0
          width: 8
          height: 5
          content:
            $ref: '#/spec/panels/0'
        - x: 8
          'y': 0
          width: 8
          height: 5
          content:
            $ref: '#/spec/panels/1'
        - x: 16
          'y': 0
          width: 8
          height: 5
          content:
            $ref: '#/spec/panels/2'
        - x: 0
          'y': 5
          width: 24
          height: 16
          content:
            $ref: '#/spec/panels/3'
    variables:
    - kind: ListVariable
      spec:
        display:
          name: Cluster
          hidden: false
        defaultValue:
        - $__all
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        sort: none
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: cluster
            matchers:
            - kubevirt_vm_info
        name: cluster
    - kind: ListVariable
      spec:
        display:
          name: Namespace
          description: Filter the Virtual Machine by its Namespace
          hidden: false
        defaultValue:
        - $__all
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        sort: none
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: namespace
            matchers:
            - kubevirt_vmi_info
        name: namespace
    - kind: ListVariable
      spec:
        display:
          name: VM Name
          description: Filter the Virtual Machine by its name
          hidden: false
        defaultValue:
        - $__all
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        sort: none
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: name
            matchers:
            - kubevirt_vmi_info
        name: name
    - kind: ListVariable
      spec:
        display:
          name: Status
          hidden: false
        defaultValue: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info)))
        allowAllValue: false
        allowMultiple: false
        plugin:
          kind: StaticListVariable
          spec:
            values:
            - label: All
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info)))
            - label: stopped
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group="non_running"}>0)))
            - label: starting
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group="starting"} > 0)))
            - label: migrating
              value: on(cluster, name, namespace) group_left() (0*(sum by (cluster, namespace, name)(kubevirt_vm_info{status_group="migrating"}>0)))
            - label: error
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group="error"}>0)))
            - label: running
              value: on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group="running"}>0)))
        name: status
    - kind: TextVariable
      spec:
        display:
          name: Days in Status >
          description: Filter the Virtual Machines that are in the specific status for more then the selected number of days
          hidden: false
        value: '0'
        name: days_in_status_gt
    - kind: TextVariable
      spec:
        display:
          name: Days in Status <
          description: Filter the Virtual Machines that are in the specific status for less then the selected number of days
          hidden: false
        value: '1000'
        name: days_in_status_lt
    duration: 1h
    refreshInterval: 0s
    datasources: {}
