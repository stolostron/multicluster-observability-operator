---
apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: acm-virtual-machines-utilization
  namespace: observability-virtualization
spec:
  config:
    display:
      name: Utilization dashboards / Virtual Machines Resources Utilization
    duration: 1h
    layouts:
    - kind: Grid
      spec:
        display:
          title: Panel Group 1
        items:
        - content:
            $ref: '#/spec/panels/0'
          height: 20
          width: 24
          x: 0
          'y': 0
    panels:
      '0':
        kind: Panel
        spec:
          display:
            description: The dashboard is showing the Virtual Machines utilization.
            name: Virtual Machines Utilization
          plugin:
            kind: Table
            spec:
              columnSettings:
              - hide: true
                name: timestamp
              - header: Cluster
                name: cluster
              - header: Namespace
                name: namespace
              - header: VM Name
                name: name
              - header: Status
                name: status
              - header: Guest Agent
                name: 'value #18'
                cellSettings:
                - condition:
                    kind: Value
                    spec:
                      value: '1'
                  text: Reporting
                - condition:
                    kind: Misc
                    spec:
                      value: 'null'
                  text: Not Reporting
                  textColor: '#F2495C'
              - header: Allocated vCPU
                hide: true
                name: 'value #3'
              - format: &id001
                  unit: seconds
                header: CPU Usage
                hide: true
                name: 'value #2'
              - format: &id002
                  unit: percent-decimal
                header: CPU Usage (%)
                name: 'value #4'
              - format: *id001
                header: CPU Delay Time
                hide: true
                name: 'value #11'
              - format: *id002
                header: CPU Delay (%)
                name: 'value #12'
              - format: &id003
                  shortValues: true
                  unit: bytes
                header: Allocated Memory
                hide: true
                name: 'value #6'
              - format: *id003
                header: Memory Usage
                hide: true
                name: 'value #5'
              - format: *id002
                header: Memory Usage (%)
                name: 'value #7'
              - format: *id003
                header: Memory Swap Traffic
                name: 'value #14'
              - format: *id001
                header: CPU I/O Wait
                name: 'value #13'
              - format: *id003
                header: Storage Traffic
                name: 'value #9'
              - header: Storage IOPs
                name: 'value #10'
                format:
                  unit: decimal
                  decimalPlaces: 5
              - format: *id003
                header: Network Traffic
                name: 'value #8'
              - hide: true
                name: 'value #1'
              - format: *id003
                header: File System Capacity
                hide: true
                name: 'value #15'
              - format: *id003
                header: File System Usage
                hide: true
                name: 'value #16'
              - format: *id002
                header: File System Usage (Max %)
                name: 'value #17'
              - hide: true
                name: __name__
              - hide: true
                name: clusterID
              - hide: true
                name: container
              - hide: true
                name: endpoint
              - hide: true
                name: instance
              - hide: true
                name: job
              - hide: true
                name: pod
              - hide: true
                name: receive
              - hide: true
                name: service
              - hide: true
                name: tenant_id
              - hide: true
                name: guest_os_kernel_release
              - hide: true
                name: guest_os_machine
              - hide: true
                name: os
              - hide: true
                name: disk_name
              transforms:
              - kind: MergeSeries
                spec: {}
              - kind: JoinByColumnValue
                spec:
                  columns:
                  - cluster
                  - name
                  - namespace
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: |-
                    sum by (cluster, namespace, name, status) (
                      label_replace(
                        label_replace(
                          kubevirt_vm_info{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", status_group=~"$status"} > 0,
                          "status", "$1", "status_group", "(.*)"
                        ),
                        "status", "stopped", "status", "non_running"
                      )
                    )
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster,namespace,name)(rate(kubevirt_vmi_cpu_usage_seconds_total{cluster=~"$cluster", name=~"$name", namespace=~"$namespace"}[$__range]))+on(cluster,name,namespace) group_left()(0*(sum
                    by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: |-
                    (
                      sum by (cluster, namespace, name) (
                      kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"}
                      * ignoring (unit)(kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="sockets", source=~"default|domain"})
                      * ignoring (unit)(kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="threads", source=~"default|domain"})
                      ) or
                      sum by (cluster, namespace, name) (
                      kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"}
                      * ignoring (unit)(kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="sockets", source=~"default|domain"})
                      )
                       or
                      sum by (cluster, namespace, name) (
                      kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"}
                      )
                    )+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: |-
                    (
                      sum by (cluster,namespace,name)(
                      rate(kubevirt_vmi_cpu_usage_seconds_total{cluster=~"$cluster", name=~"$name", namespace=~"$namespace"}[$__range])
                      )>0
                    )
                    /
                    (
                      sum by (cluster, namespace, name) (
                      (kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"})
                      * ignoring (unit)(kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="sockets", source=~"default|domain"})
                      * ignoring (unit)(kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="threads", source=~"default|domain"})
                      ) or
                      sum by (cluster, namespace, name) (
                      (kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"})
                      * ignoring (unit)(kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="sockets", source=~"default|domain"})
                    )
                    )+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: |-
                    avg by (cluster,namespace,name) (
                    avg_over_time(kubevirt_vmi_memory_used_bytes{cluster=~"$cluster",namespace=~"$namespace", name=~"$name"}[$__range])
                    )+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by(cluster, namespace, name)(max by (cluster, namespace, name)(kubevirt_vm_resource_requests{cluster=~"$cluster", namespace=~"$namespace", name=~"$name", resource="memory"}))+on(cluster,name,namespace)
                    group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: |-
                    (
                      avg by (cluster, namespace, name) (
                        avg_over_time(kubevirt_vmi_memory_used_bytes{cluster=~"$cluster", namespace=~"$namespace", name=~"$name"}[$__range])
                      )+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
                    )
                    /
                    (
                      sum by (cluster, namespace, name) (
                        max by (cluster, namespace, name)(kubevirt_vm_resource_requests{cluster=~"$cluster", namespace=~"$namespace", name=~"$name", resource="memory"})
                      )+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
                    )
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster,namespace,name)(rate(kubevirt_vmi_network_transmit_bytes_total{cluster=~"$cluster", name=~"$name", namespace=~"$namespace"}[$__range]) + rate(kubevirt_vmi_network_receive_bytes_total{cluster=~"$cluster",
                    name=~"$name", namespace=~"$namespace"}[$__range]))+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster, namespace, name)(rate(kubevirt_vmi_storage_read_traffic_bytes_total{cluster=~"$cluster",namespace=~"$namespace", name=~"$name"}[$__range]) + rate(kubevirt_vmi_storage_write_traffic_bytes_total{cluster=~"$cluster",namespace=~"$namespace",
                    name=~"$name"}[$__range]))+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster,namespace,name) (rate(kubevirt_vmi_storage_iops_read_total{cluster=~"$cluster",namespace=~"$namespace", name=~"$name"}[$__range]) + rate(kubevirt_vmi_storage_iops_write_total{cluster=~"$cluster",namespace=~"$namespace",
                    name=~"$name"}[$__range]))+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster,namespace,name) (rate(kubevirt_vmi_vcpu_delay_seconds_total{cluster=~"$cluster",namespace=~"$namespace", name=~"$name"}[$__range]))+on(cluster,name,namespace) group_left()(0*(sum
                    by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: |-
                    (
                      sum by (name, namespace, cluster)(
                        rate(kubevirt_vmi_vcpu_delay_seconds_total{cluster=~"$cluster", namespace=~"$namespace", name=~"$name"}[$__range])
                      )>0
                    )
                    /
                    (
                      sum by (cluster, namespace, name) (
                      (kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"})
                      * ignoring (unit)(kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="sockets", source=~"default|domain"})
                      * ignoring (unit)(kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="threads", source=~"default|domain"})
                      ) or
                      sum by (cluster, namespace, name) (
                      (kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"})
                      * ignoring (unit)(kubevirt_vm_resource_requests{cluster=~"$cluster", name=~"$name", namespace=~"$namespace", resource="cpu", unit="sockets", source=~"default|domain"})
                    )
                    )+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster,namespace,name)(rate(kubevirt_vmi_vcpu_wait_seconds_total{cluster=~"$cluster",namespace=~"$namespace", name=~"$name"}[$__range]))+on(cluster,name,namespace) group_left()(0*(sum
                    by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster,namespace,name) (avg_over_time(kubevirt_vmi_memory_swap_in_traffic_bytes{cluster=~"$cluster",namespace=~"$namespace", name=~"$name"}[$__range]) + avg_over_time(kubevirt_vmi_memory_swap_out_traffic_bytes{cluster=~"$cluster",namespace=~"$namespace",
                    name=~"$name"}[$__range]))+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: avg by (cluster, namespace, name) (avg_over_time(kubevirt_vmi_filesystem_capacity_bytes{cluster=~"$cluster", namespace=~"$namespace", name=~"$name"}[$__range]))+on(cluster,name,namespace)
                    group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: avg by (cluster, namespace, name) (avg_over_time(kubevirt_vmi_filesystem_used_bytes{cluster=~"$cluster", namespace=~"$namespace", name=~"$name"}[$__range]))+on(cluster,name,namespace)
                    group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: |-
                    topk(1,
                    (max by (cluster, namespace, name, disk_name) (
                      avg_over_time(kubevirt_vmi_filesystem_used_bytes{cluster=~"$cluster", namespace=~"$namespace", name=~"$name"}[$__range])
                    ))
                    /
                    (max by (cluster, namespace, name, disk_name) (
                      avg_over_time(kubevirt_vmi_filesystem_capacity_bytes{cluster=~"$cluster", namespace=~"$namespace", name=~"$name"}[$__range])
                    ))+on(cluster,name,namespace) group_left()(0*(sum by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
                    ) by (cluster, namespace, name)
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  minStep: ''
                  query: sum by (cluster, namespace, name)(kubevirt_vmi_memory_available_bytes{cluster=~"$cluster", namespace=~"$namespace", name=~"$name"}*0+1)+on(cluster,name,namespace) group_left()(0*(sum
                    by(cluster,namespace,name)(kubevirt_vm_info{status_group=~"$status"})))
    variables:
    - kind: ListVariable
      spec:
        allowAllValue: false
        allowMultiple: false
        display:
          hidden: false
          name: Cluster
        name: cluster
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: cluster
            matchers:
            - kubevirt_vm_info
        sort: none
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        defaultValue:
        - $__all
        display:
          description: Filter the Virtual Machine by its Namespace
          hidden: false
          name: Namespace
        name: namespace
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: namespace
            matchers:
            - kubevirt_vm_info{cluster=~"$cluster"}
        sort: none
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        defaultValue:
        - $__all
        display:
          description: Filter the Virtual Machine by its name
          hidden: false
          name: VM Name
        name: name
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: name
            matchers:
            - kubevirt_vm_info{cluster=~"$cluster", namespace=~"$namespace"}
        sort: alphabetical-asc
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        defaultValue:
        - $__all
        display:
          hidden: false
          name: Status
        name: status
        plugin:
          kind: StaticListVariable
          spec:
            values:
            - running
            - label: stopped
              value: non_running
            - starting
            - migrating
            - error
